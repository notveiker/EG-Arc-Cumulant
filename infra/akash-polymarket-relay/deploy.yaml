---
# Akash SDL — allowlisted Polymarket relay (deploy to a NON-US provider).
# The relay.mjs source is inlined as base64 so no Docker image build is needed.
# After deploy: GET https://<lease-host>/whoami and CONFIRM country != "US".
version: "2.0"

services:
  relay:
    image: node:20-alpine
    env:
      - RELAY_TOKEN=CHANGE_ME_set_a_strong_random_shared_secret
    command:
      - sh
      - -c
    args:
      - 'echo "" | base64 -d > /relay.mjs && node /relay.mjs'
    expose:
      - port: 80
        as: 80
        to:
          - global: true

profiles:
  compute:
    relay:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 256Mi
        storage:
          size: 256Mi
  placement:
    dcloud:
      pricing:
        relay:
          denom: uakt
          amount: 100000

deployment:
  relay:
    dcloud:
      profile: relay
      count: 1
