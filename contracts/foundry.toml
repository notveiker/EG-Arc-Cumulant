[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Arc uses USDC (18-dec native) as the gas token, fee-smoothing instead of strict
# EIP-1559, and PREVRANDAO returns 0. None of those affect compilation; they are
# handled in the deploy script and contract design (oracle resolution, no on-chain RNG).
[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"
anvil = "http://127.0.0.1:8545"

[etherscan]
# Arcscan (Blockscout-style) verification; URL/key wired when verification is needed.
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api", chain = 5042002 }
